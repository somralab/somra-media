name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GOTOOLCHAIN: auto
  CGO_ENABLED: '0'

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m
      - name: pnpm install
        run: pnpm --dir web install --frozen-lockfile
      - name: web lint
        run: pnpm --dir web run lint
      - name: web format check
        run: pnpm --dir web run format:check
      - name: web typecheck
        run: pnpm --dir web run typecheck

  i18n-check:
    name: i18n-check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: locale parity
        run: bash scripts/i18n-check.sh

  unit-test:
    name: unit-test
    needs: i18n-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: go test
        run: go test ./... -count=1 -coverprofile=coverage.go.out
      - name: pnpm install
        run: pnpm --dir web install --frozen-lockfile
      - name: web test (with coverage)
        run: pnpm --dir web run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.go.out
            web/coverage/coverage-summary.json
          if-no-files-found: error
          retention-days: 7

  integration-test:
    name: integration-test
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go test (integration tag)
        run: go test -tags=integration ./... -count=1

  coverage-gate:
    name: coverage-gate
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .
      - name: enforce thresholds
        run: bash scripts/coverage-gate.sh

  build:
    name: build
    needs: coverage-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: go build
        run: CGO_ENABLED=0 go build ./...
      - name: pnpm install
        run: pnpm --dir web install --frozen-lockfile
      - name: web build
        run: pnpm --dir web run build

  e2e:
    name: e2e
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: pnpm install
        run: pnpm --dir web install --frozen-lockfile
      - name: web build
        run: pnpm --dir web run build
      - name: go build (binary)
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -o bin/somra ./cmd/somra
      - name: install playwright browsers
        id: pw-install
        continue-on-error: true
        run: pnpm --dir web exec playwright install --with-deps chromium
      - name: run e2e tests
        if: steps.pw-install.outcome == 'success'
        env:
          CI: 'true'
          SOMRA_E2E_BACKEND_CMD: ./bin/somra
          SOMRA_E2E_DATA_DIR: ${{ runner.temp }}/somra-e2e-data
          SOMRA_E2E_WEB_DIR: ${{ github.workspace }}/web/dist
        run: pnpm --dir web exec playwright test
      - name: skip note
        if: steps.pw-install.outcome != 'success'
        run: echo "::warning::Playwright browser install failed — skipping e2e job for this run."
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  image-build:
    name: image-build
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
            type=ref,event=pr
      - name: build (PR — single arch, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: build & push (main / tags — multi-arch)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
