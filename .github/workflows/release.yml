name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  GOTOOLCHAIN: auto
  CGO_ENABLED: '0'

jobs:
  changelog:
    name: changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: generate changelog entry
        uses: orhun/git-cliff-action@v4
        with:
          config: .git-cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md CHANGELOG.md.prev
          fi
          {
            cat RELEASE_NOTES.md
            echo
            if [ -f CHANGELOG.md.prev ]; then
              tail -n +2 CHANGELOG.md.prev
            fi
          } > CHANGELOG.md

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            RELEASE_NOTES.md
            CHANGELOG.md

  release:
    name: github-release
    needs: changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

      - name: commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs(release): update changelog for ${GITHUB_REF_NAME}"
          git push

  image:
    name: release-image
    needs: changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILT_AT=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
