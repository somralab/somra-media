openapi: 3.1.0
info:
  title: Somra API
  version: 0.1.0-dev
  description: |
    Somra — all-in-one, self-hosted home media server.

    This document is the **design-first** source of truth for the Somra HTTP API.
    Frontend TypeScript types are generated from this file (see
    `scripts/gen-openapi-types.sh` and `make openapi-types`). The Go backend
    implements the contract defined here; any divergence is a bug in the
    implementation, not in this specification.

    Errors follow a `ProblemDetails`-style envelope: every error response uses
    the `ErrorResponse` schema, which is a superset compatible with RFC 7807
    "Problem Details for HTTP APIs" (the `messageKey` field carries an
    i18n key resolvable by the client; `message` carries the
    already-localized human text). See `plan/i18n-localization.md` for the
    binding i18n rules.
  license:
    name: AGPL-3.0-or-later
    identifier: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Somra
    url: https://github.com/somralab/somra-media

servers:
  - url: /api/v1
    description: Default API root (relative to the Somra server host)

security:
  - {}

tags:
  - name: system
    description: System-level endpoints (health, version, diagnostics).
  - name: auth
    description: Authentication, users, profile, and watch state.
  - name: library
    description: Media library definition and scanning.
  - name: media
    description: Media items and metadata matching.
  - name: streaming
    description: Playback, transcode sessions, and HLS manifests.

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness/readiness probe
      description: |
        Reports the operational state of the Somra server and its critical
        dependencies. Intended for container orchestrators, monitoring
        systems and the setup wizard. Does not require authentication.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  summary: All checks passing
                  value:
                    status: ok
                    time: "2025-01-01T12:34:56Z"
                    checks:
                      database:
                        status: ok
                      scheduler:
                        status: ok
                        detail: running
                      uptime:
                        status: ok
                        detail: up 1m
        "503":
          description: Service is unhealthy or starting up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unhealthy:
                  summary: Database unreachable
                  value:
                    code: service_unavailable
                    messageKey: system.health.unavailable
                    message: Service is temporarily unavailable.
                    requestId: 0HMVQK8R9
                    details:
                      database: down

  /version:
    get:
      tags: [system]
      summary: Build and version information
      description: |
        Returns the semantic version, git commit hash and build timestamp of
        the running Somra server. Does not require authentication.
      operationId: getVersion
      responses:
        "200":
          description: Version information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
              examples:
                example:
                  summary: A development build
                  value:
                    version: 0.1.0-dev
                    commit: 466b6eccd4007f1535820ee1e4f0514ac9581827
                    builtAt: "2025-01-01T12:00:00Z"

  /events/stream:
    get:
      tags: [system]
      summary: Server-sent events stream
      operationId: streamEvents
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /setup/status:
    get:
      tags: [auth]
      summary: First-run setup status
      operationId: getSetupStatus
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                required: [setupRequired]
                properties:
                  setupRequired:
                    type: boolean

  /setup/admin:
    post:
      tags: [auth]
      summary: Create first admin (one-time)
      operationId: setupAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupAdminRequest"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /auth/login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      operationId: refreshToken
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout current session
      operationId: logout
      responses:
        "204":
          description: Logged out

  /profile:
    get:
      tags: [auth]
      summary: Get current user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      tags: [auth]
      summary: Update profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      tags: [auth]
      summary: List users (admin)
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [auth]
      summary: Create user (admin)
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /libraries:
    get:
      tags: [library]
      summary: List libraries
      operationId: listLibraries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
    post:
      tags: [library]
      summary: Create library
      operationId: createLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"

  /libraries/{libraryId}:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    get:
      tags: [library]
      summary: Get library
      operationId: getLibrary
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
    put:
      tags: [library]
      summary: Update library
      operationId: updateLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
    delete:
      tags: [library]
      summary: Delete library
      operationId: deleteLibrary
      responses:
        "204":
          description: Deleted

  /libraries/{libraryId}/scan:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    post:
      tags: [library]
      summary: Trigger library scan
      operationId: triggerLibraryScan
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "202":
          description: Scan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"

  /libraries/{libraryId}/scans:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    get:
      tags: [library]
      summary: List scan history
      operationId: listLibraryScans
      responses:
        "200":
          description: Scan runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanRun"

  /libraries/{libraryId}/items:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    get:
      tags: [media]
      summary: List media items
      operationId: listMediaItems
      responses:
        "200":
          description: Media items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaItem"

  /libraries/{libraryId}/match:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    post:
      tags: [media]
      summary: Auto-match metadata
      operationId: autoMatchLibrary
      responses:
        "200":
          description: Match count
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched:
                    type: integer

  /media-items/{itemId}:
    parameters:
      - $ref: "#/components/parameters/itemId"
    get:
      tags: [media]
      summary: Get media item
      operationId: getMediaItem
      responses:
        "200":
          description: Media item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"

  /media-items/{itemId}/match-candidates:
    parameters:
      - $ref: "#/components/parameters/itemId"
    get:
      tags: [media]
      summary: Search match candidates
      operationId: listMatchCandidates
      responses:
        "200":
          description: Candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchCandidate"

  /media-items/{itemId}/rematch:
    parameters:
      - $ref: "#/components/parameters/itemId"
    post:
      tags: [media]
      summary: Manual rematch
      operationId: rematchMediaItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RematchRequest"
      responses:
        "204":
          description: Rematched

  /media-items/{itemId}/play:
    parameters:
      - $ref: "#/components/parameters/itemId"
    post:
      tags: [streaming]
      summary: Start playback session
      operationId: startPlayback
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayRequest"
      responses:
        "200":
          description: Playback session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayResponse"

  /streaming/sessions:
    get:
      tags: [streaming]
      summary: List active playback sessions
      operationId: listPlaybackSessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlaybackSessionSummary"

  /streaming/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/sessionId"
    delete:
      tags: [streaming]
      summary: Stop playback session
      operationId: stopPlaybackSession
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session stopped

  /streaming/sessions/{sessionId}/master.m3u8:
    parameters:
      - $ref: "#/components/parameters/sessionId"
    get:
      tags: [streaming]
      summary: HLS master manifest
      operationId: getMasterManifest
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Master playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /streaming/sessions/{sessionId}/{file}:
    parameters:
      - $ref: "#/components/parameters/sessionId"
      - name: file
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [streaming]
      summary: HLS segment or init file
      operationId: getStreamSegment
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Segment bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived JWT access token issued by the auth module. The matching
        revocable refresh token is delivered out-of-band (HTTP-only cookie).
        Not applied to any operation in this revision; reserved for the auth
        endpoints introduced in Sprint 03.

  schemas:
    HealthResponse:
      type: object
      description: Health probe payload.
      additionalProperties: false
      required: [status, time, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
          description: Aggregated health verdict.
          examples: [ok]
        time:
          type: string
          format: date-time
          description: Server time when the probe was evaluated (RFC 3339).
          examples: ["2025-01-01T12:34:56Z"]
        checks:
          type: object
          description: |
            Map of dependency-name to per-check status object. Concrete
            keys are implementation-defined (`database`, `scheduler`,
            `uptime`, ...) and may evolve; clients must treat unknown
            keys as informational only and ignore unknown extra fields.
          additionalProperties:
            $ref: "#/components/schemas/HealthCheckStatus"
          examples:
            - database:
                status: ok
              scheduler:
                status: ok
                detail: running

    HealthCheckStatus:
      type: object
      description: Per-dependency health status entry.
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable, down]
          description: |
            Per-dependency status. `down` is reserved for critical
            providers (e.g. database) that report a fatal failure;
            non-critical providers cap out at `degraded`.
        detail:
          type: string
          description: Human-readable detail (e.g. "running", "up 5m").
        extra:
          type: object
          additionalProperties: true
          description: Provider-specific structured data.

    VersionResponse:
      type: object
      description: Build/version metadata.
      additionalProperties: false
      required: [version, commit, builtAt]
      properties:
        version:
          type: string
          description: Semantic version (SemVer 2.0.0), optionally with a pre-release suffix.
          examples: ["0.1.0-dev"]
        commit:
          type: string
          description: Full or short git commit hash the binary was built from.
          examples: ["466b6eccd4007f1535820ee1e4f0514ac9581827"]
        builtAt:
          type: string
          format: date-time
          description: UTC build timestamp (RFC 3339).
          examples: ["2025-01-01T12:00:00Z"]

    ErrorResponse:
      type: object
      description: |
        Canonical error envelope returned by every Somra endpoint on failure.
        This schema is compatible with RFC 7807 "Problem Details for HTTP
        APIs" — clients that expect Problem Details can map fields as
        follows: `type` ≈ `code`, `title` ≈ `messageKey`, `detail` ≈ `message`,
        `instance` ≈ `requestId`. Therefore `ProblemDetails` is an alias of
        `ErrorResponse` (see below).
      additionalProperties: false
      required: [code, messageKey, message]
      properties:
        code:
          type: string
          description: |
            Machine-readable error code in `snake_case`. Stable across releases;
            clients may switch on this value.
          examples: [validation_failed, not_found, service_unavailable]
        messageKey:
          type: string
          description: |
            i18n key resolvable on the client (e.g. `auth.login.invalid_credentials`).
            Format: `domain.context.key`. See `plan/i18n-localization.md`.
          examples: [system.health.unavailable]
        message:
          type: string
          description: |
            Server-side localized human-readable message. May be presented to
            end users as a fallback when the client cannot resolve `messageKey`.
          examples: ["Service is temporarily unavailable."]
        requestId:
          type: string
          description: |
            Correlation identifier for log lookup. Echoed from the
            `X-Request-Id` response header.
          examples: ["0HMVQK8R9"]
        details:
          type: object
          description: |
            Optional structured details (e.g. per-field validation errors).
            Shape is endpoint-specific; clients must tolerate unknown keys.
          additionalProperties: true

    ProblemDetails:
      description: |
        Alias for `ErrorResponse`, provided so that callers familiar with
        RFC 7807 can refer to the same schema by its canonical name.
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"

    Library:
      type: object
      required: [id, name, kind, paths, watchEnabled]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        kind:
          type: string
          enum: [movie, tv, music]
        paths:
          type: array
          items:
            type: string
        watchEnabled:
          type: boolean

    LibraryInput:
      type: object
      required: [name, kind, paths]
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [movie, tv, music]
        paths:
          type: array
          items:
            type: string
        watchEnabled:
          type: boolean

    ScanRequest:
      type: object
      properties:
        type:
          type: string
          enum: [full, incremental]
          default: full

    ScanResponse:
      type: object
      required: [scanRunId, taskId]
      properties:
        scanRunId:
          type: integer
          format: int64
        taskId:
          type: string

    ScanRun:
      type: object
      properties:
        id:
          type: integer
        libraryId:
          type: integer
        taskId:
          type: string
        scanType:
          type: string
        status:
          type: string
        filesTotal:
          type: integer
        filesDone:
          type: integer
        error:
          type: string

    MediaItem:
      type: object
      properties:
        id:
          type: integer
        libraryId:
          type: integer
        kind:
          type: string
        title:
          type: string
        year:
          type: integer
        overview:
          type: string
        posterUrl:
          type: string
        matchStatus:
          type: string
        matchScore:
          type: number

    MatchCandidate:
      type: object
      properties:
        provider:
          type: string
        externalId:
          type: string
        title:
          type: string
        year:
          type: integer
        score:
          type: number
        posterUrl:
          type: string

    RematchRequest:
      type: object
      required: [provider, externalId]
      properties:
        provider:
          type: string
        externalId:
          type: string

    ClientCapabilities:
      type: object
      properties:
        videoCodecs:
          type: array
          items:
            type: string
        audioCodecs:
          type: array
          items:
            type: string
        containers:
          type: array
          items:
            type: string
        maxBitrate:
          type: integer
          format: int64
        supportsHdr:
          type: boolean
        supportsHevc:
          type: boolean
        maxAudioChannels:
          type: integer

    PlayRequest:
      type: object
      properties:
        capabilities:
          $ref: "#/components/schemas/ClientCapabilities"
        audioStreamIndex:
          type: integer
          nullable: true
        subtitleStreamIndex:
          type: integer
          nullable: true
        startPositionMs:
          type: integer
          format: int64

    PlayResponse:
      type: object
      required: [sessionId, mode, manifestUrl, expiresAt]
      properties:
        sessionId:
          type: string
        mode:
          type: string
          enum: [direct_play, direct_stream, transcode]
        manifestUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
        reason:
          type: string

    PlaybackSessionSummary:
      type: object
      properties:
        sessionId:
          type: string
        mediaItemId:
          type: integer
          format: int64
        mode:
          type: string
        status:
          type: string
        expiresAt:
          type: string
          format: date-time

    AudioTrack:
      type: object
      properties:
        index:
          type: integer
        language:
          type: string
        codec:
          type: string
        channels:
          type: integer

    SubtitleTrack:
      type: object
      properties:
        index:
          type: integer
        language:
          type: string
        codec:
          type: string

    StreamInfo:
      type: object
      properties:
        mode:
          type: string
        manifestUrl:
          type: string
        audioTracks:
          type: array
          items:
            $ref: "#/components/schemas/AudioTrack"
        subtitleTracks:
          type: array
          items:
            $ref: "#/components/schemas/SubtitleTrack"

    SetupAdminRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        deviceLabel:
          type: string

    TokenResponse:
      type: object
      required: [accessToken, expiresAt, user]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    RefreshResponse:
      type: object
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        disabled:
          type: boolean

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        roles:
          type: array
          items:
            type: string

    UserProfile:
      type: object
      properties:
        userId:
          type: string
        locale:
          type: string
          enum: [en-US, tr-TR]
        theme:
          type: string
          enum: [cinematic, aurora, noir, minimal]
        avatarUrl:
          type: string
        maxContentRating:
          type: string
          enum: [G, PG, PG-13, R, NC-17]
          nullable: true
        isChild:
          type: boolean

    UserProfileUpdate:
      type: object
      properties:
        locale:
          type: string
        theme:
          type: string
        avatarUrl:
          type: string
        maxContentRating:
          type: string
          nullable: true
        isChild:
          type: boolean

  parameters:
    libraryId:
      name: libraryId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    itemId:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
