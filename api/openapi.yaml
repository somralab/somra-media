openapi: 3.1.0
info:
  title: Somra API
  version: 0.1.0-dev
  description: |
    Somra — all-in-one, self-hosted home media server.

    This document is the **design-first** source of truth for the Somra HTTP API.
    Frontend TypeScript types are generated from this file (see
    `scripts/gen-openapi-types.sh` and `make openapi-types`). The Go backend
    implements the contract defined here; any divergence is a bug in the
    implementation, not in this specification.

    Errors follow a `ProblemDetails`-style envelope: every error response uses
    the `ErrorResponse` schema, which is a superset compatible with RFC 7807
    "Problem Details for HTTP APIs" (the `messageKey` field carries an
    i18n key resolvable by the client; `message` carries the
    already-localized human text). See `.plan/i18n-localization.md` for the
    binding i18n rules.
  license:
    name: AGPL-3.0-or-later
    identifier: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Somra
    url: https://github.com/somralab/somra-media

servers:
  - url: /api/v1
    description: Default API root (relative to the Somra server host)

security:
  - {}

tags:
  - name: system
    description: System-level endpoints (health, version, diagnostics).
  - name: auth
    description: Authentication, users, profile, and watch state.
  - name: library
    description: Media library definition and scanning.
  - name: media
    description: Media items and metadata matching.
  - name: discover
    description: Home shelves, search, and browse discovery.
  - name: streaming
    description: Playback, transcode sessions, and HLS manifests.
  - name: settings
    description: Central settings and smart defaults.
  - name: onboarding
    description: First-run setup wizard state machine.
  - name: subtitles
    description: Subtitle search, download, and management.
  - name: requests
    description: Content request workflow and discovery.
  - name: notifications
    description: Notification channels and user preferences.
  - name: plugins
    description: Plugin catalog and instance management (indexers, download clients).

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness/readiness probe
      description: |
        Reports the operational state of the Somra server and its critical
        dependencies. Intended for container orchestrators, monitoring
        systems and the setup wizard. Does not require authentication.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  summary: All checks passing
                  value:
                    status: ok
                    time: "2025-01-01T12:34:56Z"
                    checks:
                      database:
                        status: ok
                      scheduler:
                        status: ok
                        detail: running
                      uptime:
                        status: ok
                        detail: up 1m
        "503":
          description: Service is unhealthy or starting up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unhealthy:
                  summary: Database unreachable
                  value:
                    code: service_unavailable
                    messageKey: system.health.unavailable
                    message: Service is temporarily unavailable.
                    requestId: 0HMVQK8R9
                    details:
                      database: down

  /version:
    get:
      tags: [system]
      summary: Build and version information
      description: |
        Returns the semantic version, git commit hash and build timestamp of
        the running Somra server. Does not require authentication.
      operationId: getVersion
      responses:
        "200":
          description: Version information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
              examples:
                example:
                  summary: A development build
                  value:
                    version: 0.1.0-dev
                    commit: 466b6eccd4007f1535820ee1e4f0514ac9581827
                    builtAt: "2025-01-01T12:00:00Z"

  /events/stream:
    get:
      tags: [system]
      summary: Server-sent events stream
      operationId: streamEvents
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /system/detect:
    get:
      tags: [system]
      summary: Detect system hardware and validate storage paths
      operationId: detectSystem
      parameters:
        - name: paths
          in: query
          description: Comma-separated paths to validate (optional; defaults to configured data/cache dirs)
          schema:
            type: string
      responses:
        "200":
          description: System profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemProfile"

  /setup/status:
    get:
      tags: [auth]
      summary: First-run setup status
      operationId: getSetupStatus
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatusResponse"

  /setup/admin:
    post:
      tags: [auth]
      summary: Create first admin (one-time)
      operationId: setupAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupAdminRequest"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /onboarding/status:
    get:
      tags: [onboarding]
      summary: Onboarding wizard state
      operationId: getOnboardingStatus
      responses:
        "200":
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"

  /onboarding/step:
    post:
      tags: [onboarding]
      summary: Advance or update an onboarding step
      operationId: advanceOnboardingStep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingStepRequest"
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"

  /onboarding/complete:
    post:
      tags: [onboarding]
      summary: Mark onboarding as completed
      operationId: completeOnboarding
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Onboarding completed

  /settings:
    get:
      tags: [settings]
      summary: Get all settings grouped by category
      operationId: getSettings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsSnapshot"

  /settings/{category}:
    patch:
      tags: [settings]
      summary: Update settings in a category
      operationId: patchSettingsCategory
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
            enum: [general, library, playback, subtitles, streaming]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsCategoryPatch"
      responses:
        "200":
          description: Updated category settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsCategory"

  /subtitles/search:
    get:
      tags: [subtitles]
      summary: Search external subtitle providers
      operationId: searchSubtitles
      security:
        - bearerAuth: []
      parameters:
        - name: mediaItemId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: language
          in: query
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SubtitleSearchResult"
    post:
      tags: [subtitles]
      summary: Search external subtitle providers (POST body)
      operationId: searchSubtitlesPost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubtitleSearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SubtitleSearchResult"

  /subtitles/download:
    post:
      tags: [subtitles]
      summary: Download a subtitle from a provider
      operationId: downloadSubtitle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubtitleDownloadRequest"
      responses:
        "201":
          description: Subtitle downloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedSubtitle"

  /subtitles/upload:
    post:
      tags: [subtitles]
      summary: Upload a subtitle file manually
      operationId: uploadSubtitle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [mediaItemId, file]
              properties:
                mediaItemId:
                  type: integer
                  format: int64
                language:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Subtitle uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedSubtitle"

  /media-items/{itemId}/subtitles:
    get:
      tags: [subtitles]
      summary: List subtitles for a media item
      operationId: listMediaSubtitles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/itemId"
      responses:
        "200":
          description: Subtitle tracks
          content:
            application/json:
              schema:
                type: object
                required: [subtitles]
                properties:
                  subtitles:
                    type: array
                    items:
                      $ref: "#/components/schemas/ManagedSubtitle"

  /auth/login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      operationId: refreshToken
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout current session
      operationId: logout
      responses:
        "204":
          description: Logged out

  /profile:
    get:
      tags: [auth]
      summary: Get current user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      tags: [auth]
      summary: Update profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      tags: [auth]
      summary: List users (admin)
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [auth]
      summary: Create user (admin)
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /libraries:
    get:
      tags: [library]
      summary: List libraries
      operationId: listLibraries
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
    post:
      tags: [library]
      summary: Create library
      operationId: createLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"

  /libraries/{libraryId}:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    get:
      tags: [library]
      summary: Get library
      operationId: getLibrary
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
    put:
      tags: [library]
      summary: Update library
      operationId: updateLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
    delete:
      tags: [library]
      summary: Delete library
      operationId: deleteLibrary
      responses:
        "204":
          description: Deleted

  /libraries/{libraryId}/scan:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    post:
      tags: [library]
      summary: Trigger library scan
      operationId: triggerLibraryScan
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "202":
          description: Scan accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"

  /libraries/{libraryId}/scans:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    get:
      tags: [library]
      summary: List scan history
      operationId: listLibraryScans
      responses:
        "200":
          description: Scan runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanRun"

  /libraries/{libraryId}/items:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    get:
      tags: [discover, media]
      summary: List media items (paginated, filterable)
      operationId: listMediaItemsPaginated
      security:
        - bearerAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, year, created_at]
        - name: genre
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: watchStatus
          in: query
          schema:
            type: string
            enum: [all, unwatched, in_progress, completed]
      responses:
        "200":
          description: Paginated media items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMediaItems"

  /libraries/{libraryId}/match:
    parameters:
      - $ref: "#/components/parameters/libraryId"
    post:
      tags: [media]
      summary: Auto-match metadata
      operationId: autoMatchLibrary
      responses:
        "200":
          description: Match count
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched:
                    type: integer

  /media-items/{itemId}/detail:
    parameters:
      - $ref: "#/components/parameters/itemId"
    get:
      tags: [discover, media]
      summary: Get full media detail
      operationId: getMediaDetail
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Media detail with seasons, cast, and images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDetail"

  /discover/home:
    get:
      tags: [discover]
      summary: Personalized discover shelves
      operationId: getDiscoverHome
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Home discover shelves
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverHome"

  /search:
    get:
      tags: [discover]
      summary: Full-text search
      operationId: searchMedia
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /watch-state:
    get:
      tags: [auth]
      summary: List watch states for current user
      operationId: listWatchStates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Watch states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchState"

  /watch-state/{mediaItemId}:
    parameters:
      - name: mediaItemId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [auth]
      summary: Get watch state for an item
      operationId: getWatchState
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Watch state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchState"
    put:
      tags: [auth]
      summary: Upsert watch state
      operationId: upsertWatchState
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchStateUpdate"
      responses:
        "200":
          description: Updated watch state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchState"

  /favorites:
    get:
      tags: [auth]
      summary: List favorite media item ids
      operationId: listFavorites
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Favorite item ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                  format: int64

  /favorites/{mediaItemId}:
    parameters:
      - name: mediaItemId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags: [auth]
      summary: Add favorite
      operationId: addFavorite
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Added
    delete:
      tags: [auth]
      summary: Remove favorite
      operationId: removeFavorite
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removed

  /watchlist:
    get:
      tags: [auth]
      summary: List watchlist media item ids
      operationId: listWatchlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Watchlist item ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                  format: int64

  /watchlist/{mediaItemId}:
    parameters:
      - name: mediaItemId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags: [auth]
      summary: Add to watchlist
      operationId: addWatchlist
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Added
    delete:
      tags: [auth]
      summary: Remove from watchlist
      operationId: removeWatchlist
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removed

  /media-items/{itemId}:
    parameters:
      - $ref: "#/components/parameters/itemId"
    get:
      tags: [media]
      summary: Get media item
      operationId: getMediaItem
      responses:
        "200":
          description: Media item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"

  /media-items/{itemId}/match-candidates:
    parameters:
      - $ref: "#/components/parameters/itemId"
    get:
      tags: [media]
      summary: Search match candidates
      operationId: listMatchCandidates
      responses:
        "200":
          description: Candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchCandidate"

  /media-items/{itemId}/rematch:
    parameters:
      - $ref: "#/components/parameters/itemId"
    post:
      tags: [media]
      summary: Manual rematch
      operationId: rematchMediaItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RematchRequest"
      responses:
        "204":
          description: Rematched

  /media-items/{itemId}/play:
    parameters:
      - $ref: "#/components/parameters/itemId"
    post:
      tags: [streaming]
      summary: Start playback session
      operationId: startPlayback
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayRequest"
      responses:
        "200":
          description: Playback session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayResponse"

  /streaming/sessions:
    get:
      tags: [streaming]
      summary: List active playback sessions
      operationId: listPlaybackSessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlaybackSessionSummary"

  /streaming/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/sessionId"
    delete:
      tags: [streaming]
      summary: Stop playback session
      operationId: stopPlaybackSession
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session stopped

  /streaming/sessions/{sessionId}/master.m3u8:
    parameters:
      - $ref: "#/components/parameters/sessionId"
    get:
      tags: [streaming]
      summary: HLS master manifest
      operationId: getMasterManifest
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Master playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /streaming/sessions/{sessionId}/{file}:
    parameters:
      - $ref: "#/components/parameters/sessionId"
      - name: file
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [streaming]
      summary: HLS segment or init file
      operationId: getStreamSegment
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Segment bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /requests:
    get:
      tags: [requests]
      summary: List content requests
      operationId: listRequests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RequestStatus"
        - name: userId
          in: query
          description: Filter by request owner (admin only).
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Requests
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContentRequest"
    post:
      tags: [requests]
      summary: Create a content request
      operationId: createRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequestInput"
